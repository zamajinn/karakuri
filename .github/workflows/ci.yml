name: CI

on push:
  branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -e .[dev]
    - name: lint with ruff
      run: ruff check .
    - name: Check formatting
      run: ruff format --check .
    - name: Run tests
      run: pytest -v