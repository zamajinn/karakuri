name: CI

#mainへのpushと全PRで自動実行
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -e .[dev]  # .[dev]でpytestとruffもインストール
    - name: lint with ruff
      run: ruff check .
    - name: Check formatting
      # CIではコードのフォーマットが正しいかをチェックするだけで、実際のフォーマットは行わない
      run: ruff format --check .
    - name: Run tests
      run: pytest -v